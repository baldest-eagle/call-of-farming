[Rainmeter]
Update=1000
AccurateText=1
OnRefreshAction=[!CommandMeasure MeasureState "Run"]

[Variables]
; Delta Theme Palette
ColorBG=26,27,30
ColorPlate=42,44,54
ColorHandle=169,177,214
ColorAccent=122,162,247
ColorText=169,177,214
State=0

; --- Measures ---

[MeasureState]
Measure=Plugin
Plugin=RunCommand
Parameter=schtasks /Query /TN "FarmCycle"
State=Hide
OutputType=ANSI
UpdateDivider=-1
FinishAction=[!EnableMeasure MeasureCheckOutput][!CommandMeasure MeasureCheckOutput "Update"]

[MeasureCheckOutput]
Measure=String
String=[MeasureState]
IfMatch=FarmCycle
IfMatchAction=[!SetVariable State 1][!UpdateMeter *][!Redraw]
IfNotMatchAction=[!SetVariable State 0][!UpdateMeter *][!Redraw]
DynamicVariables=1
UpdateDivider=-1
Disabled=1

[MeasureStart]
Measure=Plugin
Plugin=RunCommand
Parameter=powershell.exe -ExecutionPolicy Bypass -File "C:\Users\kyleh\.gemini\BotProject\start_farm.ps1"
State=Hide
FinishAction=[!CommandMeasure MeasureState "Run"]

[MeasureStop]
Measure=Plugin
Plugin=RunCommand
Parameter=powershell.exe -ExecutionPolicy Bypass -File "C:\Users\kyleh\.gemini\BotProject\stop_farm.ps1"
State=Hide
FinishAction=[!CommandMeasure MeasureState "Run"]

; --- Meters ---

[MeterPlate]
Meter=Shape
Shape=Rectangle 0,0,60,100,8 | Fill Color #ColorPlate# | StrokeWidth 2 | Stroke Color #ColorBG#
X=10
Y=10
LeftMouseUpAction=[!IfCondition "#State# == 0" "[!CommandMeasure MeasureStart Run]" "[!CommandMeasure MeasureStop Run]"]
DynamicVariables=1
ToolTipText="Toggle Farm Bot"

[MeterSwitchBase]
Meter=Shape
Shape=Rectangle 25,35,30,50,4 | Fill Color #ColorBG# | StrokeWidth 1 | Stroke Color #ColorPlate#
X=0
Y=0

[MeterSwitchHandle]
Meter=Shape
; Handle position depends on State
Shape=Rectangle 28,(#State# == 0 ? 60 : 40),24,20,2 | Fill Color (#State# == 0 ? #ColorHandle# : #ColorAccent#) | StrokeWidth 1 | Stroke Color #ColorBG#
DynamicVariables=1
X=0
Y=0

[MeterLabel]
Meter=String
Text="FARM BOT"
FontFace=Segoe UI
FontSize=8
FontWeight=700
FontColor=#ColorText#
AntiAlias=1
X=40
Y=115
StringAlign=Center
