[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
OnRefreshAction=[!CommandMeasure MeasureState "Run"]

[Variables]
; JapanDock Background
BgColor=235,232,216,240

; Hex ECECE0 -> 236,236,224
ColorResting=236,236,224
; Hex CBCDB7 -> 203,205,183
ColorPressed=203,205,183

SquareSize=60
Spacing=15
Padding=25
Width=(#Padding# * 2 + #SquareSize# * 2 + #Spacing#)
Height=(#Padding# * 2 + #SquareSize#)

State=0

; --- Measures ---

[MeasureState]
Measure=Plugin
Plugin=RunCommand
Parameter=schtasks /Query /TN "FarmCycle"
State=Hide
OutputType=ANSI
UpdateDivider=-1
FinishAction=[!EnableMeasure MeasureCheckOutput][!CommandMeasure MeasureCheckOutput "Update"]

[MeasureCheckOutput]
Measure=String
String=[MeasureState]
; If Task Found (Bot is ON)
IfMatch=FarmCycle
IfMatchAction=[!SetVariable State 1][!SetOption MeterBotOn Shape "Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorPressed# | Stroke Width 0"][!SetOption MeterBotOff Shape "Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorResting# | Stroke Width 0"][!UpdateMeter *][!Redraw]
; If Task Not Found (Bot is OFF)
IfNotMatchAction=[!SetVariable State 0][!SetOption MeterBotOn Shape "Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorResting# | Stroke Width 0"][!SetOption MeterBotOff Shape "Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorPressed# | Stroke Width 0"][!UpdateMeter *][!Redraw]
DynamicVariables=1
UpdateDivider=-1
Disabled=1

[MeasureStart]
Measure=Plugin
Plugin=RunCommand
Parameter=powershell.exe -ExecutionPolicy Bypass -File "C:\Users\kyleh\.gemini\BotProject\start_farm.ps1"
State=Hide
FinishAction=[!CommandMeasure MeasureState "Run"]

[MeasureStop]
Measure=Plugin
Plugin=RunCommand
Parameter=powershell.exe -ExecutionPolicy Bypass -File "C:\Users\kyleh\.gemini\BotProject\stop_farm.ps1"
State=Hide
FinishAction=[!CommandMeasure MeasureState "Run"]

; --- Meters ---

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,12 | Fill Color #BgColor# | Stroke Width 1 | Stroke Color 200,200,180,180
AntiAlias=1

[MeterBotOn]
Meter=Shape
; Initial shape, color will be updated by MeasureCheckOutput
Shape=Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorResting# | Stroke Width 0
X=#Padding#
Y=#Padding#
LeftMouseUpAction=[!IfCondition "#State# == 0" "[!CommandMeasure MeasureStart Run]"]
DynamicVariables=1
ToolTipText="Start Bot"

[MeterBotOff]
Meter=Shape
; Initial shape, color will be updated by MeasureCheckOutput
Shape=Rectangle 0,0,#SquareSize#,#SquareSize#,2 | Fill Color #ColorPressed# | Stroke Width 0
X=(#Spacing#)R
Y=#Padding#
LeftMouseUpAction=[!IfCondition "#State# == 1" "[!CommandMeasure MeasureStop Run]"]
DynamicVariables=1
ToolTipText="Stop Bot"
